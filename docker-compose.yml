services:
  # ===========================================================================
  # MySQL Database Service (MySQL 8.0)
  # ===========================================================================
  mysql:
    image: mysql:8.0
    container_name: datapipeline-mysql
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "123456"
      MYSQL_DATABASE: "data_pipeline"
    volumes:
      - mysql_data:/var/lib/mysql
      # Map initialization SQL scripts in exact execution order
      - ./backend/src/main/resources/db/init.sql:/docker-entrypoint-initdb.d/1-init.sql
      - ./backend/src/main/resources/sql/sys_db_connection.sql:/docker-entrypoint-initdb.d/2-sys_db_connection.sql
      - ./backend/src/main/resources/sql/sync_tables.sql:/docker-entrypoint-initdb.d/3-sync_tables.sql
      - ./backend/src/main/resources/sql/log_tables.sql:/docker-entrypoint-initdb.d/4-log_tables.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p123456"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================================================
  # Redis Cache Service
  # ===========================================================================
  redis:
    image: redis:7.2-alpine
    container_name: datapipeline-redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --requirepass 123456
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "123456", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================================================
  # Backend Spring Boot Service (JDK 25 + Virtual Threads)
  # ===========================================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: datapipeline-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      # Override database and redis configurations for docker network environment
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/data_pipeline?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true"
      SPRING_DATASOURCE_USERNAME: "root"
      SPRING_DATASOURCE_PASSWORD: "123456"
      SPRING_DATA_REDIS_HOST: "redis"
      SPRING_DATA_REDIS_PORT: "6379"
      SPRING_DATA_REDIS_PASSWORD: "123456"
      SEATUNNEL_API_BASE_URL: "http://seatunnel:8080" # Placeholder for local SeaTunnel cluster
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ===========================================================================
  # Nginx Gateway & Frontend Service (Vue 3 + Vite 6 + Nginx proxy)
  # ===========================================================================
  nginx:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: datapipeline-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      # Mount Nginx configuration from the host for easy modification and instant reload without image rebuild
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Mount Nginx logs to the host for easy monitoring and troubleshooting
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - backend

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
